syntax = "proto3";

package inventory;

option java_multiple_files = true;
option java_package = "com.aleksandar.microbench.inventory.grpc";
option java_outer_classname = "InventoryReservationProto";

service InventoryReservationService {
  rpc ReserveStock (ReserveStockRequestGrpc) returns (ReserveStockResponseGrpc);
}

message ReserveStockRequestGrpc {
  repeated ReserveStockItemGrpc items = 1;
}

message ReserveStockItemGrpc {
  int64 product_id = 1;
  int32 quantity = 2;
}

message ReserveStockResponseGrpc {
  string status = 1;
}